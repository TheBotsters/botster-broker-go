<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botster Broker (Go)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e1e4e8; padding: 20px; }
        h1 { color: #58a6ff; margin-bottom: 4px; font-size: 1.4em; }
        .subtitle { color: #8b949e; font-size: 0.85em; margin-bottom: 24px; }
        .section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .section h2 { color: #c9d1d9; font-size: 1.1em; margin-bottom: 12px; }
        .safe-banner { background: #f8514926; border: 1px solid #f85149; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: none; }
        .safe-banner.active { display: block; }
        .safe-banner span { color: #f85149; font-weight: 600; }
        .btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85em; }
        .btn:hover { background: #30363d; }
        .btn-danger { border-color: #f85149; color: #f85149; }
        .btn-danger:hover { background: #f8514926; }
        .btn-safe { border-color: #3fb950; color: #3fb950; }
        .btn-safe:hover { background: #3fb95026; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #8b949e; font-weight: 500; font-size: 0.8em; padding: 8px 4px; border-bottom: 1px solid #21262d; }
        td { padding: 8px 4px; font-size: 0.9em; border-bottom: 1px solid #21262d; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75em; font-weight: 500; }
        .badge-online { background: #3fb95026; color: #3fb950; }
        .badge-offline { background: #8b949e26; color: #8b949e; }
        .badge-safe { background: #f8514926; color: #f85149; }
        .badge-live { background: #3fb95026; color: #3fb950; }
        #status { color: #8b949e; font-size: 0.8em; margin-top: 16px; }
    </style>
</head>
<body>
    <h1>🤖 Botster Broker <span style="color:#8b949e;font-weight:300">(Go)</span></h1>
    <p class="subtitle">Clean-room reimplementation — built by Síofra on the actuator 🌿</p>

    <div id="safe-banner" class="safe-banner">
        ⚠️ <span>SAFE MODE ACTIVE</span> — All actuator commands are blocked
        <button class="btn btn-safe" onclick="toggleGlobalSafe()" style="float:right">Disable</button>
    </div>

    <div class="section">
        <h2>Agents</h2>
        <table>
            <thead><tr><th>Name</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="agents-body"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>Actuators</h2>
        <table>
            <thead><tr><th>Name</th><th>Type</th><th>Status</th></tr></thead>
            <tbody id="actuators-body"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>Secrets</h2>
        <p id="secrets-count" style="color:#8b949e">Loading...</p>
    </div>

    <div class="section">
        <h2>Controls</h2>
        <button class="btn btn-danger" onclick="toggleGlobalSafe()">Toggle Global Safe Mode</button>
    </div>

    <p id="status">Connecting...</p>

    <script type="module" src="/main.js"></script>
</body>
</html>
