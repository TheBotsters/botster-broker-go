<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botster Spine v2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: #0d1117; color: #c9d1d9; padding: 20px; }
    h1 { color: #58a6ff; margin-bottom: 4px; font-size: 1.4em; }
    h2 { color: #8b949e; margin: 20px 0 10px; font-size: 1.1em; }
    .subtitle { color: #8b949e; font-size: 0.85em; margin-bottom: 20px; }
    .safe-banner { background: #da3633; color: white; padding: 10px 16px; border-radius: 6px; margin-bottom: 16px; display: none; font-weight: bold; }
    .safe-banner.active { display: block; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 12px 16px; margin-bottom: 8px; }
    .card .name { color: #58a6ff; font-weight: bold; }
    .card .meta { color: #8b949e; font-size: 0.85em; margin-top: 4px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75em; font-weight: bold; }
    .badge.online { background: #238636; color: white; }
    .badge.offline { background: #484f58; color: #c9d1d9; }
    .badge.safe { background: #da3633; color: white; }
    .badge.brain { background: #1f6feb; color: white; }
    .badge.vps { background: #388bfd; color: white; }
    .badge.macbook { background: #a371f7; color: white; }
    button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85em; }
    button:hover { background: #30363d; }
    button.danger { border-color: #da3633; color: #da3633; }
    button.danger:hover { background: #da3633; color: white; }
    .row { display: flex; justify-content: space-between; align-items: center; }
    .stats { display: flex; gap: 16px; margin-bottom: 16px; }
    .stat { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 12px 16px; text-align: center; flex: 1; }
    .stat .num { font-size: 1.8em; font-weight: bold; color: #58a6ff; }
    .stat .label { color: #8b949e; font-size: 0.8em; }
    nav { margin-bottom: 20px; display: flex; gap: 12px; }
    nav a { color: #58a6ff; text-decoration: none; padding: 4px 8px; border-radius: 4px; font-size: 0.9em; }
    nav a:hover { background: #161b22; }
    nav a.active { background: #1f6feb; color: white; }
    .user-bar { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 0.85em; color: #8b949e; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    #error { color: #da3633; margin: 10px 0; display: none; }
  </style>
</head>
<body>
  <div class="user-bar">
    <span id="user-email"></span>
    <button onclick="logout()">Logout</button>
  </div>

  <h1>🔐 Botster Spine <span style="color:#8b949e">v2</span></h1>
  <div class="subtitle">Brain · Spine · Actuator — secure agent infrastructure</div>

  <nav>
    <a href="#" class="active" data-tab="overview" onclick="switchTab('overview', this)">Overview</a>
    <a href="#" data-tab="agents" onclick="switchTab('agents', this)">Agents</a>
    <a href="#" data-tab="actuators" onclick="switchTab('actuators', this)">Actuators</a>
    <a href="/secrets">Secrets</a>
      </nav>

  <div id="safe-banner" class="safe-banner">⚠️ SAFE MODE ACTIVE — all commands blocked</div>
  <div id="error"></div>

  <!-- Overview tab -->
  <div id="tab-overview" class="tab-content active">
    <div class="stats">
      <div class="stat"><div class="num" id="agent-count">-</div><div class="label">Agents</div></div>
      <div class="stat"><div class="num" id="actuator-count">-</div><div class="label">Actuators</div></div>
      <div class="stat"><div class="num" id="secret-count">-</div><div class="label">Secrets</div></div>
      <div class="stat"><div class="num" id="schema-version">-</div><div class="label">Schema</div></div>
    </div>

    <div class="row">
      <h2>Status</h2>
      <button id="toggle-global-safe" onclick="toggleGlobalSafe()">Safe Mode</button>
    </div>
  </div>

  <!-- Agents tab -->
  <div id="tab-agents" class="tab-content">
    <div class="row">
      <h2>Agents</h2>
    </div>
    <div id="agents-list"></div>
  </div>

  <!-- Actuators tab -->
  <div id="tab-actuators" class="tab-content">
    <h2>Actuators</h2>
    <div id="actuators-list"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
