<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botster Broker — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 32px; width: 360px; }
    h1 { color: #58a6ff; font-size: 1.3em; margin-bottom: 24px; text-align: center; }
    label { display: block; color: #8b949e; font-size: 0.85em; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 1em; margin-bottom: 16px; outline: none; }
    input:focus { border-color: #58a6ff; }
    button { width: 100%; padding: 10px; background: #238636; color: white; border: none; border-radius: 6px; font-size: 1em; cursor: pointer; font-weight: bold; }
    button:hover { background: #2ea043; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #da3633; font-size: 0.85em; margin-bottom: 12px; display: none; text-align: center; }
    .subtitle { color: #8b949e; font-size: 0.8em; text-align: center; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>🔧 Botster Broker</h1>
    <div class="subtitle">Sign in to chat with your agents</div>
    <div id="error" class="error"></div>
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <button type="submit" id="btn">Sign In</button>
    </form>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');
    const btn = document.getElementById('btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/chat/';
        } else {
          errorEl.textContent = data.error || 'Login failed';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'Connection error';
        errorEl.style.display = 'block';
      }
      btn.disabled = false;
      btn.textContent = 'Sign In';
    });

    // If already logged in, redirect
    fetch('/auth/status').then(r => r.json()).then(d => {
      if (d.authenticated) window.location.href = '/chat/';
    });
  </script>
</body>
</html>
