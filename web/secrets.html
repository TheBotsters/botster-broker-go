<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Botster Spine v2 — Secrets</title>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,monospace; background:#0d1117; color:#c9d1d9; padding:20px; }
    h1 { color:#58a6ff; margin:0 0 4px; }
    .subtitle{ color:#8b949e; margin-bottom:16px; }
    nav { display:flex; gap:12px; margin-bottom:16px; }
    nav a { color:#58a6ff; text-decoration:none; padding:4px 8px; border-radius:4px; }
    nav a.active{ background:#1f6feb; color:white; }
    .card{ background:#161b22; border:1px solid #30363d; border-radius:8px; padding:12px; margin-bottom:12px; }
    .row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    input,select,button{ background:#0d1117; border:1px solid #30363d; color:#c9d1d9; border-radius:6px; padding:8px; }
    button{ cursor:pointer; background:#21262d; }
    table{ width:100%; border-collapse:collapse; background:#161b22; border:1px solid #30363d; }
    th,td{ border-bottom:1px solid #30363d; padding:10px; text-align:left; }
    th{ color:#8b949e; }
    .muted{ color:#8b949e; font-size:12px; }
    .pill{ display:inline-block; padding:2px 8px; border-radius:999px; background:#30363d; margin-right:4px; font-size:12px; }
    .ok{ color:#3fb950; }
    .err{ color:#f85149; }
  </style>
</head>
<body>
  <h1>🔐 Botster Spine <span style="color:#8b949e">v2</span></h1>
  <div class="subtitle">Secrets — create/update and grant access by agent</div>
  <nav>
    <a href="/dashboard">Overview</a>
    <a href="/dashboard" onclick="sessionStorage.setItem('dashboard_tab','agents')">Agents</a>
    <a href="/dashboard" onclick="sessionStorage.setItem('dashboard_tab','actuators')">Actuators</a>
    <a href="/secrets" class="active">Secrets</a>
  </nav>

  <div class="card">
    <div class="row">
      <input id="name" placeholder="SECRET_NAME (e.g. ANTHROPIC_TOKEN)" style="min-width:280px" />
      <select id="provider">
        <option value="anthropic">anthropic</option>
        <option value="openai">openai</option>
        <option value="deepseek">deepseek</option>
        <option value="xai">xai</option>
        <option value="other">other</option>
      </select>
      <input id="value" placeholder="secret value" style="min-width:320px" />
      <button onclick="createSecret()">Create Secret</button>
    </div>
    <div class="muted">Values are accepted for create/update but never displayed.</div>
  </div>

  <div id="status" class="muted"></div>

  <table>
    <thead>
      <tr><th>Name</th><th>Provider</th><th>Grants</th><th>Update Value</th><th>Grant Access</th></tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    let agents = [];

    async function api(url, opts={}) {
      const res = await fetch(url, { credentials:'same-origin', headers:{'Content-Type':'application/json'}, ...opts });
      if (res.status===401 || res.status===303){ location.href='/login'; return null; }
      const data = await res.json().catch(()=>({}));
      if (!res.ok) throw new Error(data.error || `${res.status}`);
      return data;
    }

    function setStatus(msg, ok=true){
      const el=document.getElementById('status');
      el.className = ok ? 'ok' : 'err';
      el.textContent = msg;
      setTimeout(()=>{el.textContent=''; el.className='muted';}, 4000);
    }

    async function load(){
      const auth = await api('/auth/status');
      if (!auth || !auth.authenticated) return;
      agents = await api('/secrets/api/agents') || [];
      const secrets = await api('/secrets/api/list') || [];
      render(secrets);
    }

    function render(secrets){
      const tbody=document.getElementById('tbody');
      tbody.innerHTML='';
      for (const s of secrets){
        const tr=document.createElement('tr');
        const grants=(s.grants||[]).map(g=>`<span class="pill">${g}</span>`).join('') || '<span class="muted">none</span>';
        const opts=agents.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
        tr.innerHTML=`
          <td><strong>${s.name}</strong><div class="muted">${s.id}</div></td>
          <td>${s.provider||'—'}</td>
          <td>${grants}</td>
          <td>
            <div class="row">
              <input id="val-${s.id}" placeholder="new value" />
              <button onclick="updateSecret('${s.id}')">Update</button>
            </div>
          </td>
          <td>
            <div class="row">
              <select id="agent-${s.id}"><option value="">select agent</option>${opts}</select>
              <button onclick="grant('${s.id}')">Grant</button>
            </div>
          </td>`;
        tbody.appendChild(tr);
      }
    }

    async function createSecret(){
      try{
        await api('/secrets/api/create',{method:'POST', body: JSON.stringify({
          name: document.getElementById('name').value.trim(),
          provider: document.getElementById('provider').value,
          value: document.getElementById('value').value
        })});
        setStatus('Secret created');
        document.getElementById('value').value='';
        load();
      }catch(e){ setStatus(e.message,false); }
    }

    async function updateSecret(id){
      try{
        const v=document.getElementById(`val-${id}`).value;
        await api(`/secrets/api/${id}`,{method:'PUT', body: JSON.stringify({value:v})});
        setStatus('Secret updated');
        document.getElementById(`val-${id}`).value='';
      }catch(e){ setStatus(e.message,false); }
    }

    async function grant(id){
      try{
        const agentId=document.getElementById(`agent-${id}`).value;
        if(!agentId) throw new Error('select an agent');
        await api(`/secrets/api/${id}/grant`,{method:'POST', body: JSON.stringify({agent_id:agentId})});
        setStatus('Access granted');
        load();
      }catch(e){ setStatus(e.message,false); }
    }

    load();
  </script>
</body>
</html>
