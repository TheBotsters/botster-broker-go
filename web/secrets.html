<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botster Broker — Secrets</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: #0d1117; color: #c9d1d9; padding: 20px; }
    h1 { color: #58a6ff; margin-bottom: 4px; font-size: 1.4em; }
    .subtitle { color: #8b949e; font-size: 0.85em; margin-bottom: 20px; }
    .nav { display: flex; gap: 12px; margin-bottom: 20px; }
    .nav a { color: #58a6ff; text-decoration: none; padding: 6px 12px; border: 1px solid #30363d; border-radius: 6px; font-size: 0.85em; }
    .nav a:hover { background: #30363d; }
    .nav a.active { background: #1f6feb; color: white; border-color: #1f6feb; }
    table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid #30363d; border-radius: 6px; overflow: hidden; }
    th { background: #21262d; color: #8b949e; font-weight: 600; text-align: left; padding: 12px 16px; font-size: 0.85em; border-bottom: 1px solid #30363d; }
    td { padding: 12px 16px; border-bottom: 1px solid #30363d; font-size: 0.9em; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: #21262d; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75em; font-weight: bold; }
    .badge.anthropic { background: #d4a5a5; color: #1a1a1a; }
    .badge.openai { background: #74c7ec; color: #1a1a1a; }
    .badge.brave { background: #f9c858; color: #1a1a1a; }
    .badge.other { background: #484f58; color: #c9d1d9; }
    .loading { text-align: center; padding: 40px; color: #8b949e; }
    .error { color: #da3633; margin: 10px 0; padding: 10px; background: rgba(218, 54, 51, 0.1); border-radius: 6px; display: none; }
    .empty { text-align: center; padding: 40px; color: #8b949e; }
  </style>
</head>
<body>
  <h1>🔧 Botster Broker <span style="color:#8b949e">(Go)</span></h1>
  <div class="subtitle">Secrets Management — Read-only view</div>

  <div class="nav">
    <a href="/">Dashboard</a>
    <a href="/chat/">Chat</a>
    <a href="/secrets" class="active">Secrets</a>
  </div>

  <div id="error" class="error"></div>

  <div id="secrets-container">
    <div class="loading" id="loading">Loading secrets...</div>
    <table id="secrets-table" style="display: none;">
      <thead>
        <tr>
          <th>Name</th>
          <th>Provider</th>
          <th>Created</th>
          <th>Updated</th>
        </tr>
      </thead>
      <tbody id="secrets-body"></tbody>
    </table>
    <div class="empty" id="empty" style="display: none;">No secrets found</div>
  </div>

  <script>
    // Check authentication status
    async function checkAuth() {
      try {
        const res = await fetch('/auth/status');
        const data = await res.json();
        if (!data.authenticated) {
          window.location.href = '/login';
          return false;
        }
        return true;
      } catch (err) {
        console.error('Auth check failed:', err);
        window.location.href = '/login';
        return false;
      }
    }

    // Get provider badge class
    function getProviderClass(provider) {
      if (!provider) return 'other';
      const lower = provider.toLowerCase();
      if (lower.includes('anthropic')) return 'anthropic';
      if (lower.includes('openai')) return 'openai';
      if (lower.includes('brave')) return 'brave';
      return 'other';
    }

    // Format date for display
    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const date = new Date(dateStr);
      return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Fetch and display secrets
    async function loadSecrets() {
      const isAuthenticated = await checkAuth();
      if (!isAuthenticated) return;

      try {
        const secretsRes = await fetch('/secrets/api/list');
        if (!secretsRes.ok) {
          throw new Error(`Failed to fetch secrets: ${secretsRes.status}`);
        }

        const secrets = await secretsRes.json();
        
        document.getElementById('loading').style.display = 'none';
        
        if (!secrets || secrets.length === 0) {
          document.getElementById('empty').style.display = 'block';
          return;
        }

        const tbody = document.getElementById('secrets-body');
        tbody.innerHTML = '';
        
        secrets.forEach(secret => {
          const row = document.createElement('tr');
          const providerClass = getProviderClass(secret.provider);
          
          row.innerHTML = `
            <td><strong>${secret.name}</strong></td>
            <td><span class="badge ${providerClass}">${secret.provider || '—'}</span></td>
            <td>${formatDate(secret.created_at)}</td>
            <td>${formatDate(secret.updated_at)}</td>
          `;
          tbody.appendChild(row);
        });

        document.getElementById('secrets-table').style.display = 'table';
      } catch (err) {
        console.error('Error loading secrets:', err);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').textContent = `Error: ${err.message}`;
        document.getElementById('error').style.display = 'block';
      }
    }

    // Initialize
    loadSecrets();
  </script>
</body>
</html>
