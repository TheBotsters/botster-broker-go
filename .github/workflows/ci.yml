name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt check
        run: |
          output=$(gofmt -s -l .)
          if [ -n "$output" ]; then
            echo "The following files need gofmt -s:"
            echo "$output"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
